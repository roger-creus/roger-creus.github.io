<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Black hole">
  <defs>
    <radialGradient id="void" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#16110a"/>
      <stop offset="100%" stop-color="#060609"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a6526"/>
      <stop offset="50%" stop-color="#f2a440"/>
      <stop offset="100%" stop-color="#ffe1a4"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="31" fill="url(#void)"/>

  <!-- soft glow -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#f2a440" stroke-width="10" opacity="0.16"/>
  <!-- glowing photon ring, brighter toward the bottom (Doppler beaming) -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="url(#ring)" stroke-width="6"/>
  <!-- shadow -->
  <circle cx="32" cy="32" r="12.4" fill="url(#void)"/>
</svg>
